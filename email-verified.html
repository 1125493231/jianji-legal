<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>邮箱验证 · 简记</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
      background: #f6f7f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #1f2937;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 56px 36px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.03);
    }

    /* —— 状态图标：CSS 绘制的圆形对勾 / 警示 / 邮件 —— */
    .icon-wrap {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      margin: 0 auto 28px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 默认成功态 */
    .icon-wrap.success {
      background: #f0fdf4;
    }
    .icon-wrap.success::before {
      content: "";
      width: 24px;
      height: 12px;
      border-left: 3px solid #16a34a;
      border-bottom: 3px solid #16a34a;
      transform: rotate(-45deg) translate(2px, -2px);
      border-radius: 1px;
    }

    /* 错误态 */
    .icon-wrap.error {
      background: #fef2f2;
    }
    .icon-wrap.error::before,
    .icon-wrap.error::after {
      content: "";
      position: absolute;
      width: 26px;
      height: 3px;
      background: #ef4444;
      border-radius: 2px;
    }
    .icon-wrap.error::before { transform: rotate(45deg); }
    .icon-wrap.error::after  { transform: rotate(-45deg); }

    /* 默认态（无参数） */
    .icon-wrap.pending {
      background: #f3f4f6;
    }
    .icon-wrap.pending::before {
      content: "";
      width: 28px;
      height: 20px;
      border: 2px solid #9ca3af;
      border-radius: 3px;
    }
    .icon-wrap.pending::after {
      content: "";
      position: absolute;
      top: 26px;
      width: 22px;
      height: 11px;
      border-left: 2px solid #9ca3af;
      border-bottom: 2px solid #9ca3af;
      transform: rotate(-45deg);
      border-radius: 1px;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #111827;
      letter-spacing: 0.2px;
    }
    .status {
      font-size: 14px;
      color: #6b7280;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 36px;
    }
    .btn {
      width: 100%;
      padding: 14px 20px;
      border-radius: 12px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: all 0.2s ease;
      letter-spacing: 0.2px;
    }
    .btn-primary {
      background: #16a34a;
      color: #ffffff;
    }
    .btn-primary:hover {
      background: #15803d;
    }
    .btn-ghost {
      background: transparent;
      color: #9ca3af;
      font-size: 12px;
      font-weight: 500;
    }
    .btn-ghost:hover {
      color: #6b7280;
    }

    .footer {
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid #f3f4f6;
      font-size: 11px;
      color: #9ca3af;
      line-height: 1.7;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #e5e7eb;
      border-top-color: #16a34a;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap success" id="iconWrap"></div>
    <h1 id="title">邮箱验证成功</h1>
    <div class="status" id="status">
      <span class="spinner"></span>正在确认验证状态...
    </div>

    <div class="actions">
      <a href="jianji://login" class="btn btn-primary">打开简记 App</a>
      <a href="https://1125493231.github.io/jianji-legal/" class="btn btn-ghost">查看用户协议与隐私政策</a>
    </div>

    <div class="footer">
      © 2026 简记 · All Rights Reserved<br />
      联系邮箱：1125493231@qq.com
    </div>
  </div>

  <script>
    (function () {
      var statusEl = document.getElementById('status');
      var titleEl = document.getElementById('title');
      var iconWrap = document.getElementById('iconWrap');
      var hash = window.location.hash || '';
      var search = window.location.search || '';

      var hasError = /error=/i.test(hash) || /error=/i.test(search);
      var hasToken = /access_token=/i.test(hash) || /token_hash=/i.test(search);

      setTimeout(function () {
        if (hasError) {
          iconWrap.className = 'icon-wrap error';
          titleEl.textContent = '验证链接已失效';
          statusEl.textContent = '链接可能已过期或被使用过，请回到 App 重新发送验证邮件。';
        } else if (hasToken) {
          iconWrap.className = 'icon-wrap success';
          titleEl.textContent = '邮箱验证成功';
          statusEl.textContent = '现在可以回到简记 App 登录使用了';
        } else {
          iconWrap.className = 'icon-wrap pending';
          titleEl.textContent = '邮箱验证';
          statusEl.textContent = '请点击注册邮件中的验证链接进行验证';
        }
      }, 400);
    })();
  </script>
</body>
</html>
